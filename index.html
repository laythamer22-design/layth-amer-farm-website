<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواحة الملكية ERP | النسخة الأصلية المطورة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --gold: #c5a059; --bg: #030303; --panel: #0a0a0a; }
        
        /* إعادة الماوس والخطوط الأصلية */
        * { cursor: auto !important; font-family: 'Tajawal', sans-serif; transition: 0.2s ease-in-out; }
        button, select, input, .clickable { cursor: pointer !important; }
        
        body { background: var(--bg); color: #f0f0f0; }

        /* ستايل "الواحة" الأصلي الذي تفضله */
        .glass-box {
            background: var(--panel);
            border: 1px solid rgba(197, 160, 89, 0.15);
            border-top: 3px solid var(--gold);
            border-radius: 4px;
        }

        .neo-input {
            background: #111 !important;
            border: 1px solid #222 !important;
            color: var(--gold) !important;
            padding: 14px !important;
            width: 100%;
            outline: none;
        }

        .btn-royal {
            background: var(--gold);
            color: #000;
            font-weight: 800;
            padding: 14px 28px;
            text-transform: uppercase;
        }

        .btn-royal:hover { background: #e2b765; transform: scale(1.02); }

        /* نظام الألبومات المطور بمظهر فخم */
        .album-grid { display: grid; grid-template-cols: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .album-card { position: relative; height: 300px; overflow: hidden; border: 1px solid #111; cursor: pointer; }
        .album-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .album-card:hover img { filter: brightness(1); transform: scale(1.1); }
        
        /* بطاقة الوصول (Access Card) */
        .access-card-ui {
            background: #000; border: 2px solid var(--gold); padding: 30px; text-align: right;
            background-image: linear-gradient(45deg, #050505 25%, #0a0a0a 25%, #0a0a0a 50%, #050505 50%, #050505 75%, #0a0a0a 75%, #0a0a0a 100%);
            background-size: 56.57px 56.57px;
        }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/5 bg-black/80 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="text-gold font-black text-2xl tracking-tighter italic">OASIS <span class="text-white">ERP</span></span>
        </div>
        <div class="flex gap-4">
            <button onclick="loginGate()" class="border border-gold text-gold px-5 py-2 text-[11px] font-bold hover:bg-gold hover:text-black uppercase">ADMIN PANEL</button>
        </div>
    </header>

    <main class="p-6 lg:p-16 max-w-7xl mx-auto space-y-20">
        
        <section class="glass-box p-8 max-w-2xl mx-auto text-center space-y-4">
            <h2 class="text-gold font-bold text-sm tracking-widest uppercase italic">استعلام بطاقة الوصول</h2>
            <div class="flex gap-2">
                <input type="text" id="accessInput" class="neo-input text-center" placeholder="أدخل كود الحجز (مثلاً: ID-1234)">
                <button onclick="checkAccess()" class="btn-royal">دخول</button>
            </div>
        </section>

        <section class="grid lg:grid-cols-2 gap-10">
            
            <div class="glass-box p-8 space-y-6">
                <h3 class="text-gold font-black text-xl italic border-b border-white/5 pb-2">تسجيل إقامة جديدة</h3>
                <input type="text" id="cName" class="neo-input" placeholder="الاسم الكامل للزبون">
                <input type="tel" id="cPhone" class="neo-input" placeholder="رقم الهاتف النشط">
                <input type="text" id="cDate" class="neo-input" placeholder="اختر تاريخ الوصول">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 border border-dashed border-zinc-800 text-center clickable" onclick="document.getElementById('file1').click()">
                        <span id="txt1" class="text-[10px] text-gray-500 uppercase">الهوية الموحدة</span>
                        <input type="file" id="file1" hidden onchange="docSync(this, 'txt1')">
                    </div>
                    <div class="p-4 border border-dashed border-zinc-800 text-center clickable" onclick="document.getElementById('file2').click()">
                        <span id="txt2" class="text-[10px] text-gray-500 uppercase">بطاقة السكن</span>
                        <input type="file" id="file2" hidden onchange="docSync(this, 'txt2')">
                    </div>
                </div>
                <button onclick="submitBooking()" class="btn-royal w-full">تأكيد الحجز والأرشفة</button>
            </div>

            <div class="space-y-6">
                <h3 class="text-white font-black text-xl italic uppercase">معرض الأقسام</h3>
                <div class="album-grid">
                    <div class="album-card" onclick="openGallery('pools')">
                        <img src="https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7">
                        <div class="absolute bottom-0 p-4 bg-black/90 w-full text-gold font-bold text-xs uppercase">المسابح الملكية</div>
                    </div>
                    <div class="album-card" onclick="openGallery('suites')">
                        <img src="https://images.unsplash.com/photo-1544198365-f5d60b6d8190">
                        <div class="absolute bottom-0 p-4 bg-black/90 w-full text-gold font-bold text-xs uppercase">الأجنحة والفلل</div>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <div id="adminPanel" class="fixed inset-0 z-[100] bg-black hidden overflow-y-auto p-6 lg:p-12">
        <div class="max-w-[1400px] mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-gold italic uppercase tracking-tighter">CENTRAL <span class="text-white">ARCHIVE</span></h2>
                <button onclick="closeUI()" class="border border-red-500 text-red-500 px-6 py-2 text-xs font-bold uppercase">إغلاق</button>
            </div>

            <div class="glass-box p-8 overflow-hidden">
                <table class="w-full text-right text-xs">
                    <thead class="text-gray-500 border-b border-white/5 uppercase">
                        <tr><th class="py-4">الكود</th><th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>التاريخ</th><th>المستمسكات</th></tr>
                    </thead>
                    <tbody id="ledgerData"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // داتابيز الأرشفة (Master Data)
        let OASIS_DB = JSON.parse(localStorage.getItem('oasis_final_db')) || [];
        let docCount = 0;

        window.onload = () => {
            flatpickr("#cDate", { locale: "ar", minDate: "today" });
        }

        // --- نظام الحجز والأتمتة والارشفة ---
        function submitBooking() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const date = document.getElementById('cDate').value;

            if(!name || !phone || docCount < 2) {
                return Swal.fire('تنبيه أمني', 'يرجى إكمال البيانات ورفع المستمسكات للمطابقة', 'warning');
            }

            // خوارزمية الأتمتة: تحديد الزبون الثابت (VIP)
            const isVIP = OASIS_DB.some(guest => guest.phone === phone);
            const accessCode = "OAS-" + Math.floor(1000 + Math.random() * 9000);

            const guestData = {
                code: accessCode,
                name, phone, date,
                type: isVIP ? 'VIP' : 'جديد',
                status: 'مكتملة ✅'
            };

            OASIS_DB.push(guestData);
            localStorage.setItem('oasis_final_db', JSON.stringify(OASIS_DB));

            Swal.fire({
                title: isVIP ? 'أهلاً بعودتك (VIP)' : 'تم تسجيل الحجز',
                html: `<div class="p-6 bg-black border border-gold mt-4">
                        <p class="text-gray-400 text-xs uppercase mb-2">كود الوصول الخاص بك</p>
                        <h2 class="text-4xl font-black text-gold">${accessCode}</h2>
                       </div>`,
                confirmButtonColor: '#c5a059'
            }).then(() => window.location.reload());
        }

        // --- نظام الاستعلام عن الكود (للزبان) ---
        function checkAccess() {
            const code = document.getElementById('accessInput').value;
            const guest = OASIS_DB.find(g => g.code === code);

            if(guest) {
                Swal.fire({
                    background: '#0a0a0a',
                    showConfirmButton: false,
                    html: `
                        <div class="access-card-ui">
                            <h2 class="text-gold font-black text-xl italic mb-6 border-b border-gold/20 pb-2">بطاقة الدخول الرسمية</h2>
                            <div class="space-y-3 text-sm text-white">
                                <p class="flex justify-between"><span>الاسم:</span> <span class="font-bold">${guest.name}</span></p>
                                <p class="flex justify-between"><span>الحالة:</span> <span class="text-gold font-black">${guest.type}</span></p>
                                <p class="flex justify-between"><span>التاريخ:</span> <span>${guest.date}</span></p>
                                <p class="flex justify-between text-green-500"><span>المستمسكات:</span> <span>مؤمنة ✅</span></p>
                            </div>
                        </div>
                    `
                });
            } else {
                Swal.fire('خطأ', 'الكود غير موجود في سجلات الأتمتة', 'error');
            }
        }

        // --- لوحة الإدارة والأرشفة ---
        function loginGate() {
            Swal.fire({ title: 'رمز المدير', input: 'password', confirmButtonColor: '#c5a059' }).then(res => {
                if(res.value === 'admin123') {
                    document.getElementById('adminPanel').classList.remove('hidden');
                    renderLedger();
                } else { Swal.fire('خطأ', 'الرمز السري غير صحيح', 'error'); }
            });
        }

        function renderLedger() {
            document.getElementById('ledgerData').innerHTML = OASIS_DB.slice().reverse().map(i => `
                <tr class="border-b border-white/5 hover:bg-white/5">
                    <td class="py-4 text-gold font-black">${i.code}</td>
                    <td class="font-bold uppercase">${i.name}</td>
                    <td>${i.phone}</td>
                    <td><span class="${i.type==='VIP'?'text-gold':'text-blue-400'} font-bold">${i.type}</span></td>
                    <td>${i.date}</td>
                    <td class="text-green-500">مرفوعة ✅</td>
                </tr>
            `).join('');
        }

        function docSync(input, id) { if(input.files[0]) { document.getElementById(id).innerText = "✅ مكتمل"; document.getElementById(id).classList.add('text-gold'); docCount++; } }
        function closeUI() { document.getElementById('adminPanel').classList.add('hidden'); }
        function openGallery(slug) { Swal.fire({ title: 'معرض الألبوم: ' + slug, text: 'يتم الآن عرض الصور الفاخرة...', icon: 'info' }); }
    </script>
</body>
</html>
