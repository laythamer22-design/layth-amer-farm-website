<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواحة الملكية - النظام المتكامل v12.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --gold: #c5a059; --bg: #030303; }
        * { cursor: auto !important; font-family: 'Tajawal', sans-serif; }
        button, input, .clickable { cursor: pointer !important; }
        body { background: var(--bg); color: #f0f0f0; overflow-x: hidden; }

        .glass-box { background: #0a0a0a; border: 1px solid rgba(197, 160, 89, 0.15); border-top: 3px solid var(--gold); }
        .neo-input { background: #111 !important; border: 1px solid #222 !important; color: var(--gold) !important; padding: 14px; width: 100%; outline: none; }
        .btn-royal { background: var(--gold); color: #000; font-weight: 800; padding: 14px; width: 100%; transition: 0.3s; }
        .btn-royal:hover { background: #e2b765; transform: translateY(-2px); }

        /* الألبومات */
        .album-card { position: relative; height: 250px; overflow: hidden; border: 1px solid #111; }
        .album-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.5s; }
        .album-card:hover img { filter: brightness(1); transform: scale(1.1); }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/5 bg-black/90 flex justify-between items-center sticky top-0 z-50">
        <span class="text-gold font-black text-2xl italic uppercase">OASIS ROYAL</span>
        <button onclick="loginGate()" class="border border-gold text-gold px-5 py-1 text-[10px] font-bold">لوحة المدير</button>
    </header>

    <main class="p-6 lg:p-16 max-w-7xl mx-auto space-y-16">
        
        <section class="max-w-xl mx-auto space-y-4">
            <h2 class="text-center text-gold text-xs font-bold uppercase tracking-widest">بوابة استعلام الزبائن</h2>
            <div class="flex gap-2">
                <input type="text" id="accessInput" class="neo-input text-center" placeholder="أدخل كود الوصول الخاص بك">
                <button onclick="checkAccess()" class="bg-gold text-black px-6 font-black text-sm">دخول</button>
            </div>
        </section>

        <section class="grid lg:grid-cols-2 gap-10">
            <div class="glass-box p-8 space-y-6">
                <h3 class="text-gold font-black italic border-b border-white/5 pb-2">تسجيل إقامة وأرشفة</h3>
                <input type="text" id="cName" class="neo-input" placeholder="الاسم الكامل للزبون">
                <input type="tel" id="cPhone" class="neo-input" placeholder="رقم الهاتف">
                <input type="text" id="cDate" class="neo-input" placeholder="تاريخ الحجز">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 border border-dashed border-zinc-800 text-center clickable" onclick="document.getElementById('f1').click()">
                        <span id="s1" class="text-[9px] text-gray-500 uppercase">الهوية الموحدة</span>
                        <input type="file" id="f1" hidden onchange="sync(this, 's1')">
                    </div>
                    <div class="p-4 border border-dashed border-zinc-800 text-center clickable" onclick="document.getElementById('f2').click()">
                        <span id="s2" class="text-[9px] text-gray-500 uppercase">بطاقة السكن</span>
                        <input type="file" id="f2" hidden onchange="sync(this, 's2')">
                    </div>
                </div>
                <button onclick="submitBooking()" class="btn-royal">تأكيد الحجز وتوليد الكود</button>
            </div>

            <div class="space-y-4">
                <h3 class="text-white font-black italic uppercase">ألبومات الأقسام</h3>
                <div class="grid grid-cols-1 gap-4">
                    <div class="album-card clickable" onclick="showGallery('pools')">
                        <img src="https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7">
                        <div class="absolute inset-0 flex items-center justify-center text-gold font-bold">المسابح الملكية</div>
                    </div>
                    <div class="album-card clickable" onclick="showGallery('suites')">
                        <img src="https://images.unsplash.com/photo-1544198365-f5d60b6d8190">
                        <div class="absolute inset-0 flex items-center justify-center text-gold font-bold">الأجنحة والفلل</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="adminPanel" class="fixed inset-0 z-[100] bg-black hidden overflow-y-auto p-10">
        <div class="flex justify-between items-center mb-8 border-b border-gold/20 pb-4">
            <h2 class="text-2xl font-black text-gold italic">الأرشيف المركزي</h2>
            <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-red-500 border border-red-500 px-4 py-1">إغلاق</button>
        </div>
        <div class="glass-box overflow-hidden">
            <table class="w-full text-right text-xs">
                <thead class="text-gray-500 border-b border-white/5 uppercase">
                    <tr><th class="p-4">الكود</th><th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>التاريخ</th></tr>
                </thead>
                <tbody id="ledgerBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('oasis_final_db')) || [];
        let docs = 0;

        function submitBooking() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const date = document.getElementById('cDate').value;
            if(!name || !phone || docs < 2) return Swal.fire('خطأ', 'أكمل البيانات والمستمسكات', 'error');

            const isVIP = db.some(u => u.phone === phone);
            const code = "ROY-" + Math.floor(1000 + Math.random() * 9000);
            
            const entry = { code, name, phone, date, type: isVIP ? 'VIP' : 'جديد' };
            db.push(entry);
            localStorage.setItem('oasis_final_db', JSON.stringify(db));

            Swal.fire({
                title: isVIP ? 'أهلاً بعودتك (VIP)' : 'تم الحجز',
                html: `<div class="p-4 bg-zinc-900 border border-gold mt-2"><p class="text-xs text-gray-400">كود الوصول:</p><h2 class="text-3xl font-black text-gold">${code}</h2></div>`,
                icon: 'success'
            }).then(() => window.location.reload());
        }

        function checkAccess() {
            const code = document.getElementById('accessInput').value;
            const user = db.find(u => u.code === code);
            if(user) {
                Swal.fire({
                    background: '#0a0a0a', color: '#fff',
                    html: `<div class="text-right p-4 border border-gold"><h3 class="text-gold font-bold mb-4">بطاقة الدخول الرسمية</h3><p class="mb-2">الاسم: ${user.name}</p><p class="mb-2">الحالة: ${user.type}</p><p>التاريخ: ${user.date}</p></div>`
                });
            } else { Swal.fire('خطأ', 'الكود غير موجود', 'error'); }
        }

        function loginGate() {
            Swal.fire({ title: 'رمز المدير', input: 'password' }).then(res => {
                if(res.value === 'admin123') {
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.getElementById('ledgerBody').innerHTML = db.slice().reverse().map(i => `
                        <tr class="border-b border-white/5">
                            <td class="p-4 text-gold font-bold">${i.code}</td>
                            <td>${i.name}</td><td>${i.phone}</td>
                            <td class="${i.type==='VIP'?'text-gold':'text-blue-400'}">${i.type}</td>
                            <td>${i.date}</td>
                        </tr>
                    `).join('');
                } else { Swal.fire('خطأ', 'الرمز السري غير صحيح', 'error'); }
            });
        }

        function sync(input, id) { if(input.files[0]) { document.getElementById(id).innerText = "✅ مرفوع"; docs++; } }
        function showGallery(type) { Swal.fire('المعرض', `سيتم عرض ألبوم ${type} قريباً`, 'info'); }
        flatpickr("#cDate", { minDate: "today" });
    </script>
</body>
</html>
